name: Release

# On a version tag (git tag v0.3.0 && git push origin v0.3.0):
#   1. build LaunchInspector.app (Xcode, Sparkle embedded) and a .dmg
#   2. attach the .dmg to the GitHub Release
#   3. update the signed Sparkle appcast.xml on main (the auto-update feed)
#   4. bump the Homebrew cask in vincentbattez/homebrew-tap
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the Release, upload the .dmg, push appcast.xml to main

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # we commit the updated appcast.xml back to main

      - name: Install tooling
        run: |
          set -euo pipefail
          brew install xcodegen
          SP_VER=2.9.3
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SP_VER}/Sparkle-${SP_VER}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle && tar -xJf /tmp/sparkle.tar.xz -C /tmp/sparkle
          test -x /tmp/sparkle/bin/sign_update # fail early if the Sparkle tools are missing

      - name: Build .dmg
        run: bash scripts/make-dmg.sh "${GITHUB_REF_NAME#v}"

      - name: Publish .dmg to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ### Install
            Download the `.dmg`, open it, drag **LaunchInspector** into **Applications**.

            First launch (unsigned build) is blocked by Gatekeeper: try to open it, then
            **System Settings → Privacy & Security → "Open Anyway"** (macOS 14: right-click
            → Open). After that it auto-updates via Sparkle. Or:
            `brew install --cask vincentbattez/tap/launch-inspector`.

      - name: Update signed appcast on main
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          V="${GITHUB_REF_NAME#v}"
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/LaunchInspector-${V}.dmg"
          SPARKLE_BIN=/tmp/sparkle/bin bash scripts/make-appcast.sh "$V" "dist/LaunchInspector-${V}.dmg" "$URL" appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "appcast: $V" || { echo "no change"; exit 0; }
          git push origin HEAD:main

      # Skipped unless TAP_PUSH_TOKEN is set (a PAT with contents:write on
      # homebrew-tap) — the default GITHUB_TOKEN cannot push to another repo.
      - name: Bump Homebrew cask
        env:
          TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::TAP_PUSH_TOKEN not set — skipping cask bump."
            exit 0
          fi
          V="${GITHUB_REF_NAME#v}"
          SHA=$(shasum -a 256 "dist/LaunchInspector-${V}.dmg" | awk '{print $1}')
          git clone "https://x-access-token:${TOKEN}@github.com/vincentbattez/homebrew-tap.git" /tmp/tap
          bash scripts/bump-cask.sh "$V" "$SHA" /tmp/tap/Casks/launch-inspector.rb
          cd /tmp/tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "launch-inspector $V" || { echo "no change"; exit 0; }
          git push
