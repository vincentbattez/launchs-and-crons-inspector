name: Release

# Build LaunchInspector.app and attach a .dmg to the GitHub Release whenever a
# version tag is pushed:  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create/update the Release and upload the .dmg

jobs:
  dmg:
    runs-on: macos-15 # ships Xcode 16 / Swift 6 by default
    steps:
      - uses: actions/checkout@v4

      - name: Build .dmg
        run: bash scripts/make-dmg.sh "${GITHUB_REF_NAME#v}"

      - name: Publish to the Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ### Install
            Download the `.dmg`, open it, drag **LaunchInspector** into **Applications**.

            First launch (unsigned build): **right-click the app → Open** once to get
            past Gatekeeper, or `brew install vincentbattez/tap/launch-inspector`.

  # Keep the Homebrew formula in sync with the new tag. Skipped unless the
  # TAP_PUSH_TOKEN secret is set (a PAT with contents:write on homebrew-tap) —
  # the default GITHUB_TOKEN cannot push to a different repo.
  bump-formula:
    needs: dmg
    runs-on: macos-15
    steps:
      - name: Check for tap token
        id: guard
        env:
          TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::TAP_PUSH_TOKEN not set — skipping formula bump."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source (bump script)
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          path: src

      - name: Checkout tap
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: vincentbattez/homebrew-tap
          token: ${{ secrets.TAP_PUSH_TOKEN }}
          path: tap

      - name: Bump and push
        if: steps.guard.outputs.enabled == 'true'
        run: |
          bash src/scripts/bump-formula.sh "${GITHUB_REF_NAME#v}" tap/Formula/launch-inspector.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "launch-inspector ${GITHUB_REF_NAME#v}" || { echo "no change"; exit 0; }
          git push
